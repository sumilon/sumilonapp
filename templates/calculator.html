<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Financial Calculator — EMI, SIP, FD, RD, SWP, Lumpsum">
<title>Financial Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
        integrity="sha256-oFMRyb3GNBDuLu8H3rjqylbGBCE30P7FBxjCFEy9TBU="
        crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
  --accent:#00b386;--accent-h:#009973;--accent2:#7c3aed;
  --text:#0f172a;--muted:#64748b;--danger:#dc2626;
  --r:8px;--r-lg:14px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);
  --sh-md:0 4px 16px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.07);
}
body{font-family:'Inter',system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}


/* ── Layout ── */
.wrap{max-width:960px;margin:0 auto;padding:24px 20px 48px}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.page-header p{font-size:.845rem;color:var(--muted)}

/* ── Card ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh)}

/* ── Grid ── */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:640px){.calc-grid{grid-template-columns:1fr}}

/* ── Form ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
select,input{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--r);font:inherit;font-size:.875rem;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,179,134,.13)}
input::placeholder{color:var(--muted);opacity:.65}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
select{cursor:pointer}
.field-hint{font-size:.72rem;color:var(--muted);margin-top:5px}

.calc-fields{display:none}
.calc-fields.active{display:block}

.btn-calc{width:100%;padding:11px;border:none;border-radius:var(--r);background:var(--accent);color:#fff;font:600 .9rem/1 inherit;cursor:pointer;transition:background .15s,transform .15s;margin-top:4px}
.btn-calc:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-calc:active{transform:none}

/* ── Error ── */
.error-box{background:#fef2f2;border:1.5px solid #fecaca;border-radius:var(--r);padding:10px 14px;font-size:.83rem;color:#7f1d1d;margin-top:12px;display:none}

/* ── Results ── */
.results{margin-top:16px}
.result-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:10px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.875rem}
.result-row:last-child{border-bottom:none}
.result-row .lbl{color:var(--muted)}
.result-row .val{font-weight:600;color:var(--text)}
.result-row.highlight .val{color:var(--accent);font-size:.95rem}

/* ── Chart panel ── */
.chart-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px}
.chart-wrap{width:100%;max-width:260px}
.chart-empty{text-align:center;color:var(--muted);font-size:.845rem}
.chart-empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.3;display:block}

/* ── Mobile ── */
@media(max-width:480px){
  .wrap{padding:16px 14px 40px}
  .card{padding:18px}
}
</style>
</head>
<body>

<main class="wrap">
  <div class="page-header">
    <h1>Financial Calculator</h1>
    <p>EMI · SIP · Lumpsum · FD · RD · SWP · Weight Price</p>
  </div>

  <div class="card">
    <div class="calc-grid">

      <!-- Left: inputs -->
      <div>
        <form id="calcForm" novalidate>

          <div class="field">
            <label for="calcSelect">Calculator Type</label>
            <select id="calcSelect" name="type">
              <option value="">Select a calculator</option>
              <option value="emi">EMI — Loan EMI Calculator</option>
              <option value="sip">SIP — Monthly Investment</option>
              <option value="lumpsum">Lumpsum — One-time Investment</option>
              <option value="fd">FD — Fixed Deposit</option>
              <option value="rd">RD — Recurring Deposit</option>
              <option value="swp">SWP — Systematic Withdrawal</option>
              <option value="weight">Weight Price Calculator</option>
            </select>
          </div>

          <!-- EMI -->
          <div id="f-emi" class="calc-fields">
            <div class="field"><label for="emi_loan">Loan Amount (₹)</label><input type="number" id="emi_loan" name="emi_loan" placeholder="e.g. 5000000" min="1"></div>
            <div class="field"><label for="emi_rate">Annual Interest Rate (%)</label><input type="number" id="emi_rate" name="emi_rate" placeholder="e.g. 8.5" min="0.01" step="0.01"></div>
            <div class="field"><label for="emi_years">Tenure (Years)</label><input type="number" id="emi_years" name="emi_years" placeholder="e.g. 20" min="1" step="1"></div>
          </div>

          <!-- SIP -->
          <div id="f-sip" class="calc-fields">
            <div class="field"><label for="sip_amount">Monthly Investment (₹)</label><input type="number" id="sip_amount" name="sip_amount" placeholder="e.g. 10000" min="1"></div>
            <div class="field"><label for="sip_rate">Expected Return Rate (% p.a.)</label><input type="number" id="sip_rate" name="sip_rate" placeholder="e.g. 12" min="0.01" step="0.01"></div>
            <div class="field"><label for="sip_years">Investment Duration (Years)</label><input type="number" id="sip_years" name="sip_years" placeholder="e.g. 15" min="1" step="1"></div>
          </div>

          <!-- Lumpsum -->
          <div id="f-lumpsum" class="calc-fields">
            <div class="field"><label for="lumpsum_amount">Investment Amount (₹)</label><input type="number" id="lumpsum_amount" name="lumpsum_amount" placeholder="e.g. 100000" min="1"></div>
            <div class="field"><label for="lumpsum_rate">Expected Return Rate (% p.a.)</label><input type="number" id="lumpsum_rate" name="lumpsum_rate" placeholder="e.g. 12" min="0.01" step="0.01"></div>
            <div class="field"><label for="lumpsum_years">Duration (Years)</label><input type="number" id="lumpsum_years" name="lumpsum_years" placeholder="e.g. 10" min="1" step="1"></div>
          </div>

          <!-- FD -->
          <div id="f-fd" class="calc-fields">
            <div class="field"><label for="fd_principal">Principal Amount (₹)</label><input type="number" id="fd_principal" name="fd_principal" placeholder="e.g. 100000" min="1"></div>
            <div class="field"><label for="fd_rate">Annual Interest Rate (%)</label><input type="number" id="fd_rate" name="fd_rate" placeholder="e.g. 7.5" min="0.01" step="0.01"></div>
            <div class="field"><label for="fd_years">Tenure (Years)</label><input type="number" id="fd_years" name="fd_years" placeholder="e.g. 5" min="1" step="1"></div>
            <div class="field-hint">Interest compounded quarterly</div>
          </div>

          <!-- RD -->
          <div id="f-rd" class="calc-fields">
            <div class="field"><label for="rd_deposit">Monthly Deposit (₹)</label><input type="number" id="rd_deposit" name="rd_deposit" placeholder="e.g. 5000" min="1"></div>
            <div class="field"><label for="rd_rate">Annual Interest Rate (%)</label><input type="number" id="rd_rate" name="rd_rate" placeholder="e.g. 7" min="0.01" step="0.01"></div>
            <div class="field"><label for="rd_years">Tenure (Years)</label><input type="number" id="rd_years" name="rd_years" placeholder="e.g. 3" min="1" step="1"></div>
            <div class="field-hint">Interest compounded quarterly</div>
          </div>

          <!-- SWP -->
          <div id="f-swp" class="calc-fields">
            <div class="field"><label for="swp_principal">Initial Investment (₹)</label><input type="number" id="swp_principal" name="swp_principal" placeholder="e.g. 1000000" min="1"></div>
            <div class="field"><label for="swp_withdraw">Monthly Withdrawal (₹)</label><input type="number" id="swp_withdraw" name="swp_withdraw" placeholder="e.g. 8000" min="1"></div>
            <div class="field"><label for="swp_rate">Expected Return Rate (% p.a.)</label><input type="number" id="swp_rate" name="swp_rate" placeholder="e.g. 10" min="0.01" step="0.01"></div>
            <div class="field"><label for="swp_inflation">Inflation Rate (% p.a.)</label><input type="number" id="swp_inflation" name="swp_inflation" placeholder="0" min="0" step="0.01" value="0"></div>
            <div class="field"><label for="swp_years">Withdrawal Period (Years)</label><input type="number" id="swp_years" name="swp_years" placeholder="e.g. 10" min="1" step="1"></div>
          </div>

          <!-- Weight -->
          <div id="f-weight" class="calc-fields">
            <div class="field"><label for="price_per_kg">Price per KG (₹)</label><input type="number" id="price_per_kg" name="price_per_kg" placeholder="e.g. 280" min="0.01" step="0.01"></div>
            <div class="field"><label for="weight_grams">Weight (grams)</label><input type="number" id="weight_grams" name="weight_grams" placeholder="e.g. 250" min="0.01" step="0.01"></div>
          </div>

          <button type="submit" class="btn-calc">Calculate</button>
        </form>

        <div id="errorBox" class="error-box"></div>
        <div id="results" class="results"></div>
      </div>

      <!-- Right: chart -->
      <div class="chart-panel">
        <div class="chart-empty" id="chart-empty">
          <span class="chart-empty-icon">📊</span>
          Select a calculator and enter values to see the chart
        </div>
        <div class="chart-wrap" id="chartWrap" style="display:none">
          <canvas id="chart" aria-label="Calculation results chart" role="img"></canvas>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
(function(){
  'use strict';

  /* ── Indian number format ── */
  function fmt(num) {
    if (num == null || isNaN(num)) return '0.00';
    const neg = num < 0;
    num = Math.abs(Math.round(num * 100) / 100);
    let [int, dec] = num.toFixed(2).split('.');
    if (int.length > 3) {
      const last3 = int.slice(-3);
      let rest = int.slice(0, -3), parts = [];
      while (rest.length > 2) { parts.unshift(rest.slice(-2)); rest = rest.slice(0,-2); }
      if (rest) parts.unshift(rest);
      int = parts.join(',') + ',' + last3;
    }
    return (neg ? '-' : '') + int + '.' + dec;
  }

  /* ── Validate positive ── */
  function pos(v, label) {
    const n = parseFloat(v);
    if (isNaN(n) || n <= 0) throw new Error(`"${label}" must be a positive number.`);
    return n;
  }

  /* ── Calculator functions (mirror Python exactly) ── */
  function calcEMI(loan, rate, yrs) {
    const r = rate/100/12, n = Math.round(yrs)*12;
    const emi = loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
    const total = emi*n;
    return {emi, principal:loan, interest:total-loan, total};
  }
  function calcSIP(amt, rate, yrs) {
    const r=rate/100/12, n=Math.round(yrs)*12;
    const fv = amt*((Math.pow(1+r,n)-1)/r)*(1+r);
    return {invested:amt*n, returns:fv-amt*n, total:fv};
  }
  function calcLumpsum(amt, rate, yrs) {
    const total = amt*Math.pow(1+rate/100, Math.round(yrs));
    return {invested:amt, returns:total-amt, total};
  }
  function calcFD(p, rate, yrs) {
    const total = p*Math.pow(1+rate/100/4, 4*Math.round(yrs));
    return {invested:p, returns:total-p, total};
  }
  function calcRD(dep, rate, yrs) {
    const qr=rate/100/4, n=Math.round(yrs)*12;
    let mat=0;
    for(let m=1;m<=n;m++) mat+=dep*Math.pow(1+qr,(n-m+1)/3);
    return {invested:dep*n, returns:mat-dep*n, total:mat};
  }
  function calcSWP(p, wd, rate, inf, yrs) {
    const mr=rate/100/12, mir=inf/100/12, n=Math.round(yrs)*12;
    let bal=p, out=0, cur=wd;
    for(let i=0;i<n;i++){
      bal+=bal*mr;
      if(bal<=0) break;
      if(bal<=cur){out+=bal;bal=0;break;}
      bal-=cur; out+=cur; cur*=(1+mir);
    }
    return {investment:p, withdrawal:out, final_value:bal};
  }
  function calcWeight(pkg, grams) {
    return {price:(pkg/1000)*grams};
  }

  /* ── Row builder ── */
  function row(label, value, highlight=false) {
    return `<div class="result-row${highlight?' highlight':''}">
      <span class="lbl">${label}</span>
      <span class="val">₹${fmt(value)}</span>
    </div>`;
  }

  /* ── Chart ── */
  let _chart = null;
  function drawChart(labels, data, colors) {
    const wrap  = document.getElementById('chartWrap');
    const empty = document.getElementById('chart-empty');
    if (!labels.length || data.some(d => d <= 0)) {
      wrap.style.display  = 'none';
      empty.style.display = '';
      return;
    }
    wrap.style.display  = '';
    empty.style.display = 'none';
    if (_chart) { _chart.destroy(); _chart = null; }
    const ctx = document.getElementById('chart').getContext('2d');
    _chart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 14 } },
          tooltip: { callbacks: { label: c => ` ₹${fmt(c.parsed)}` } }
        }
      }
    });
  }

  function clearChart() {
    const wrap  = document.getElementById('chartWrap');
    const empty = document.getElementById('chart-empty');
    wrap.style.display  = 'none';
    empty.style.display = '';
    if (_chart) { _chart.destroy(); _chart = null; }
  }

  /* ── UI helpers ── */
  const TYPES = ['emi','sip','lumpsum','fd','rd','swp','weight'];

  function showSection(val) {
    TYPES.forEach(t => document.getElementById('f-'+t).classList.remove('active'));
    if (val) document.getElementById('f-'+val).classList.add('active');
    document.getElementById('results').innerHTML = '';
    hideError();
    clearChart();
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = msg; b.style.display = 'block';
  }
  function hideError() {
    const b = document.getElementById('errorBox');
    b.textContent = ''; b.style.display = 'none';
  }

  /* ── Init ── */
  document.addEventListener('DOMContentLoaded', () => {
    const sel  = document.getElementById('calcSelect');
    const form = document.getElementById('calcForm');
    const res  = document.getElementById('results');

    sel.addEventListener('change', function() {
      form.querySelectorAll('input').forEach(i => {
        if (i.name !== 'swp_inflation') i.value = '';
      });
      showSection(this.value);
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      hideError();
      res.innerHTML = '';
      clearChart();

      const fd   = new FormData(form);
      const type = fd.get('type');
      if (!type) { showError('Please select a calculator type.'); return; }

      let html='', labels=[], data=[], colors=['#00b386','#7c3aed','#f59e0b'];

      try {
        if (type === 'emi') {
          const r = calcEMI(pos(fd.get('emi_loan'),'Loan Amount'), pos(fd.get('emi_rate'),'Interest Rate'), pos(fd.get('emi_years'),'Tenure'));
          html += `<div class="result-title">EMI Breakdown</div>`;
          html += row('Monthly EMI', r.emi, true);
          html += row('Principal Amount', r.principal);
          html += row('Total Interest', r.interest);
          html += row('Total Payment', r.total);
          labels=['Principal','Interest']; data=[r.principal,r.interest];
        }
        else if (type === 'sip') {
          const r = calcSIP(pos(fd.get('sip_amount'),'Monthly Investment'), pos(fd.get('sip_rate'),'Return Rate'), pos(fd.get('sip_years'),'Duration'));
          html += `<div class="result-title">SIP Returns</div>`;
          html += row('Amount Invested', r.invested);
          html += row('Estimated Returns', r.returns);
          html += row('Total Value', r.total, true);
          labels=['Invested','Returns']; data=[r.invested,r.returns];
        }
        else if (type === 'lumpsum') {
          const r = calcLumpsum(pos(fd.get('lumpsum_amount'),'Investment'), pos(fd.get('lumpsum_rate'),'Return Rate'), pos(fd.get('lumpsum_years'),'Duration'));
          html += `<div class="result-title">Lumpsum Returns</div>`;
          html += row('Amount Invested', r.invested);
          html += row('Estimated Returns', r.returns);
          html += row('Total Value', r.total, true);
          labels=['Invested','Returns']; data=[r.invested,r.returns];
        }
        else if (type === 'fd') {
          const r = calcFD(pos(fd.get('fd_principal'),'Principal'), pos(fd.get('fd_rate'),'Interest Rate'), pos(fd.get('fd_years'),'Tenure'));
          html += `<div class="result-title">FD Maturity (Quarterly Compounding)</div>`;
          html += row('Principal', r.invested);
          html += row('Interest Earned', r.returns);
          html += row('Maturity Amount', r.total, true);
          labels=['Principal','Interest']; data=[r.invested,r.returns];
        }
        else if (type === 'rd') {
          const r = calcRD(pos(fd.get('rd_deposit'),'Monthly Deposit'), pos(fd.get('rd_rate'),'Interest Rate'), pos(fd.get('rd_years'),'Tenure'));
          html += `<div class="result-title">RD Maturity (Quarterly Compounding)</div>`;
          html += row('Total Invested', r.invested);
          html += row('Interest Earned', r.returns);
          html += row('Maturity Amount', r.total, true);
          labels=['Invested','Interest']; data=[r.invested,r.returns];
        }
        else if (type === 'swp') {
          const inf = parseFloat(fd.get('swp_inflation')||'0');
          if (isNaN(inf)||inf<0) throw new Error('Inflation must be 0 or positive.');
          const r = calcSWP(pos(fd.get('swp_principal'),'Initial Investment'), pos(fd.get('swp_withdraw'),'Monthly Withdrawal'), pos(fd.get('swp_rate'),'Return Rate'), inf, pos(fd.get('swp_years'),'Period'));
          html += `<div class="result-title">SWP Summary</div>`;
          html += row('Initial Investment', r.investment);
          html += row('Total Withdrawn', r.withdrawal);
          html += row('Remaining Balance', r.final_value, true);
          if (r.final_value > 0) { labels=['Withdrawn','Remaining']; data=[r.withdrawal,r.final_value]; }
          else { labels=['Withdrawn']; data=[r.withdrawal]; colors=['#00b386']; }
        }
        else if (type === 'weight') {
          const r = calcWeight(pos(fd.get('price_per_kg'),'Price per KG'), pos(fd.get('weight_grams'),'Weight'));
          html += `<div class="result-title">Price Calculation</div>`;
          html += row('Total Price', r.price, true);
        }
      } catch(err) {
        showError(err.message || 'Invalid input. Please check all fields.');
        return;
      }

      res.innerHTML = html;
      drawChart(labels, data, colors);
    });
  });
}());
</script>
</body>
</html>
