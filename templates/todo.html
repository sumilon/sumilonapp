<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="To-do list">
    <meta name="theme-color" content="#0f172a">
    <title>To-do</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style nonce="{{ csp_nonce }}">
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;
          --accent:#0f172a;--accent-h:#1e293b;
          --text:#0f172a;--muted:#64748b;--success:#059669;--danger:#dc2626;
          --r:8px;--r-lg:12px;
          --sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);
          --sh-md:0 4px 16px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.07);
        }
        body{font-family:'Inter',system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

        /* ── Topbar ── */
        .topbar{
          background:var(--accent);color:#fff;
          padding:0 20px;height:52px;
          display:flex;align-items:center;
          position:sticky;top:0;z-index:50;
        }
        .topbar h1{font-size:.95rem;font-weight:700}

        /* ── Main wrap ── */
        .wrap{max-width:680px;margin:0 auto;padding:20px}

        /* ── Stats pills ── */
        .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
        .stat{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:4px 13px;font-size:.76rem;font-weight:500;color:var(--muted)}
        .stat strong{color:var(--text)}

        /* ── Add bar ── */
        .add-bar{
          background:var(--surface);border:1.5px solid var(--border);
          border-radius:var(--r-lg);padding:14px 16px;
          display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;
          margin-bottom:14px;box-shadow:var(--sh);
        }
        .add-title{flex:1;min-width:160px}
        .add-bar select,.add-bar input[type=date]{width:auto}

        /* ── Tabs ── */
        .tabs{
          display:flex;gap:3px;background:var(--surface);
          border:1.5px solid var(--border);border-radius:var(--r);
          padding:4px;margin-bottom:14px;
        }
        .tab{
          flex:1;padding:7px;border-radius:6px;
          font:500 .8rem/1 inherit;color:var(--muted);
          text-align:center;border:none;background:none;cursor:pointer;
          transition:background .14s,color .14s;
        }
        .tab.active{background:var(--accent);color:#fff}

        /* ── Todo list ── */
        .todo-list{display:flex;flex-direction:column;gap:8px}

        .todo-item{
          background:var(--surface);border:1.5px solid var(--border);
          border-radius:var(--r-lg);padding:12px 14px;
          display:flex;align-items:flex-start;gap:11px;
          transition:border-color .14s,box-shadow .14s;
          animation:fadeUp .18s ease;
        }
        .todo-item:hover{border-color:#cbd5e1;box-shadow:var(--sh)}
        .todo-item.done{opacity:.5}

        .chk{
          width:20px;height:20px;border-radius:5px;margin-top:1px;
          border:2px solid var(--border);cursor:pointer;flex-shrink:0;
          display:flex;align-items:center;justify-content:center;
          font-size:.72rem;font-weight:700;
          background:none;transition:background .14s,border-color .14s;
        }
        .chk.checked{background:var(--success);border-color:var(--success);color:#fff}

        .todo-body{flex:1;min-width:0}
        .todo-title{font-size:.88rem;font-weight:500;line-height:1.4}
        .todo-item.done .todo-title{text-decoration:line-through;color:var(--muted)}
        .meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}

        .badge{font-size:.67rem;font-weight:600;padding:2px 8px;border-radius:20px}
        .badge-high  {background:#fef2f2;color:#991b1b}
        .badge-medium{background:#fffbeb;color:#92400e}
        .badge-low   {background:#f0fdf4;color:#166534}
        .due{font-size:.71rem;color:var(--muted)}
        .due.over{color:var(--danger);font-weight:600}
        .note-preview{font-size:.73rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

        .item-actions{display:flex;gap:5px;flex-shrink:0}

        /* ── Empty state ── */
        .empty{text-align:center;padding:48px 20px;color:var(--muted)}
        .empty-icon{font-size:2rem;display:block;margin-bottom:10px;opacity:.4}
        .empty h3{font-size:1rem;color:var(--text);margin-bottom:5px;font-weight:600}
        .empty p{font-size:.845rem}

        /* ── Form elements ── */
        input,select,textarea{
          width:100%;padding:9px 13px;
          border:1.5px solid var(--border);border-radius:var(--r);
          font:inherit;font-size:.875rem;color:var(--text);background:var(--surface);
          transition:border-color .15s,box-shadow .15s;outline:none;
        }
        input:focus,select:focus,textarea:focus{border-color:#94a3b8;box-shadow:0 0 0 3px rgba(100,116,139,.13)}
        input::placeholder{color:var(--muted);opacity:.65}
        textarea{resize:vertical;min-height:68px}
        select{cursor:pointer}

        .field{margin-bottom:14px}
        .field label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}

        /* ── Buttons ── */
        .btn{
          display:inline-flex;align-items:center;gap:5px;
          padding:8px 14px;border:1.5px solid transparent;border-radius:var(--r);
          font:600 .83rem/1 inherit;cursor:pointer;
          transition:background .14s,transform .14s;
          white-space:nowrap;user-select:none;
        }
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-dark  {background:var(--accent);color:#fff}
        .btn-dark:not(:disabled):hover{background:var(--accent-h);transform:translateY(-1px)}
        .btn-ghost {background:transparent;color:var(--muted);border-color:var(--border)}
        .btn-ghost:not(:disabled):hover{background:var(--bg);color:var(--text)}
        .btn-red   {background:#fef2f2;color:var(--danger);border-color:#fecaca}
        .btn-red:not(:disabled):hover{background:#fee2e2}
        .btn-sm  {padding:5px 10px;font-size:.78rem}
        .btn-icon{padding:6px 8px}

        /* ── Dialog — centred in viewport ── */
        dialog{
          background:var(--surface);border:none;border-radius:var(--r-lg);
          padding:24px;width:min(440px,calc(100vw - 32px));
          max-height:90vh;overflow-y:auto;box-shadow:var(--sh-md);
          position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;
        }
        dialog::backdrop{background:rgba(15,23,42,.45);backdrop-filter:blur(3px)}
        dialog[open]{animation:dlgIn .2s cubic-bezier(.16,1,.3,1)}
        @keyframes dlgIn{from{opacity:0;transform:translate(-50%,-47%)}to{opacity:1;transform:translate(-50%,-50%)}}
        .dlg-title{font-size:1rem;font-weight:700;margin-bottom:18px}
        .dlg-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

        /* ── Toast ── */
        #toast{
          position:fixed;bottom:18px;right:18px;
          padding:10px 15px;border-radius:9px;font-size:.83rem;font-weight:500;
          display:none;align-items:center;gap:7px;z-index:9999;max-width:280px;box-shadow:var(--sh-md);
        }
        #toast.show{display:flex;animation:fadeUp .2s ease}
        #toast.success{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
        #toast.error  {background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}

        @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

        /* ── Mobile ── */
        @media(max-width:480px){
          .topbar{padding:0 14px}
          .wrap{padding:14px}
          .add-bar{flex-direction:column}
          .add-bar select,.add-bar input[type=date]{width:100%}
          .todo-item{flex-wrap:wrap}
          .item-actions{width:100%;justify-content:flex-end;margin-top:4px}
          dialog{padding:18px}
        }
    </style>
</head>
<body>

<header class="topbar">
  <h1>✅ To-do</h1>
</header>

<div class="wrap" role="main">

    <div class="stats" id="stats" aria-live="polite"></div>

    <!-- Quick-add -->
    <div class="add-bar">
        <input type="text" id="q-title" class="add-title"
               placeholder="What needs doing?" maxlength="200" aria-label="New task">
        <select id="q-pri" aria-label="Priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>
        <input type="date" id="q-due" aria-label="Due date" style="min-width:130px">
        <button class="btn btn-dark" id="add-btn" type="button">+ Add</button>
    </div>

    <!-- Tabs -->
    <div class="tabs" role="tablist" aria-label="Filter tasks">
        <button class="tab active" role="tab" aria-selected="true"  data-tab="all"    type="button">All</button>
        <button class="tab"        role="tab" aria-selected="false" data-tab="active" type="button">Active</button>
        <button class="tab"        role="tab" aria-selected="false" data-tab="done"   type="button">Done</button>
    </div>

    <div class="todo-list" id="todo-list" aria-live="polite"></div>
</div>

<!-- Edit dialog -->
<dialog id="edit-dlg" aria-labelledby="edit-ttl">
    <div class="dlg-title" id="edit-ttl">Edit Task</div>
    <input type="hidden" id="e-id">
    <div class="field">
        <label for="e-title">Title *</label>
        <input type="text" id="e-title" maxlength="200">
    </div>
    <div class="field">
        <label for="e-notes">Notes</label>
        <textarea id="e-notes" maxlength="1000"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field" style="margin:0">
            <label for="e-pri">Priority</label>
            <select id="e-pri">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        <div class="field" style="margin:0">
            <label for="e-due">Due date</label>
            <input type="date" id="e-due">
        </div>
    </div>
    <div class="dlg-footer">
        <button class="btn btn-ghost" id="e-cancel" type="button">Cancel</button>
        <button class="btn btn-dark"  id="e-save"   type="button">Save</button>
    </div>
</dialog>

<!-- Delete confirmation dialog -->
<dialog id="del-dlg" aria-labelledby="del-dlg-title" aria-describedby="del-dlg-body">
    <div class="dlg-title" id="del-dlg-title">Delete Task</div>
    <p id="del-dlg-body" style="font-size:.88rem;color:var(--muted);margin-bottom:0">
        Delete <strong id="del-dlg-name"></strong>? This cannot be undone.
    </p>
    <div class="dlg-footer">
        <button class="btn btn-ghost" id="del-cancel" type="button">Cancel</button>
        <button class="btn btn-red"   id="del-confirm" type="button">Delete</button>
    </div>
</dialog>

<div id="toast" role="alert" aria-live="polite"></div>

<script nonce="{{ csp_nonce }}">
    (function () {
      'use strict';

      /* ── localStorage persistence ────────────────────────────────────────────
         All data is stored in the browser under the key 'app_todos'.
         No server calls are made — all state is client-side only.
         Data persists across page closes, browser restarts, and device sleeps.
      ── */
      const STORE_KEY = 'app_todos';

      function loadFromStorage() {
        try {
          return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
        } catch { return []; }
      }

      function saveToStorage(data) {
        try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
        catch { toast('Could not save — storage may be full'); }
      }

      /* ── State ── */
      let items = loadFromStorage();
      let tab   = 'all';

      /* ── DOM shortcuts ── */
      const $ = id => document.getElementById(id);
      const list = $('todo-list');
      const dlg  = $('edit-dlg');

      /* ── Init ── */
      document.addEventListener('DOMContentLoaded', () => {
        render();

        $('add-btn').addEventListener('click', addItem);
        $('q-title').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

        document.querySelectorAll('[role=tab]').forEach(t =>
          t.addEventListener('click', () => switchTab(t.dataset.tab)));

        $('e-save').addEventListener('click', saveEdit);
        $('e-cancel').addEventListener('click', closeDialog);
        dlg.addEventListener('click', e => { if (e.target === dlg) closeDialog(); });
        dlg.addEventListener('cancel', closeDialog);
      });

      /* ── Toast ── */
      let _tt;
      function toast(msg, type = 'error') {
        const el = $('toast');
        el.textContent = msg;
        el.className   = type + ' show';
        clearTimeout(_tt);
        _tt = setTimeout(() => { el.className = ''; }, 3000);
      }

      /* ── Tab ── */
      function switchTab(t) {
        tab = t;
        document.querySelectorAll('[role=tab]').forEach(btn => {
          const on = btn.dataset.tab === t;
          btn.classList.toggle('active', on);
          btn.setAttribute('aria-selected', on);
        });
        render();
      }

      /* ── Render ── */
      function render() {
        const total = items.length;
        const done  = items.filter(i => i.done).length;

        $('stats').innerHTML = total
          ? `<div class="stat"><strong>${total}</strong> total</div>
             <div class="stat"><strong>${total - done}</strong> active</div>
             <div class="stat"><strong>${done}</strong> done</div>`
          : '';

        const ORD = { high:0, medium:1, low:2 };
        const vis = items
          .filter(i => tab === 'all' ? true : tab === 'active' ? !i.done : i.done)
          .sort((a, b) => {
            if (a.done !== b.done) return a.done ? 1 : -1;
            return (ORD[a.priority] ?? 1) - (ORD[b.priority] ?? 1);
          });

        if (!vis.length) {
          list.innerHTML = `<div class="empty">
            <span class="empty-icon" aria-hidden="true">✅</span>
            <h3>${tab === 'done' ? 'Nothing completed yet' : 'No tasks yet'}</h3>
            <p>Add a task above to get started</p>
          </div>`;
          return;
        }

        const frag = document.createDocumentFragment();
        vis.forEach(item => {
          const over = item.due && !item.done && new Date(item.due) < new Date();
          const el   = document.createElement('div');
          el.className = `todo-item${item.done ? ' done' : ''}`;
          el.innerHTML = `
            <button class="chk${item.done ? ' checked' : ''}" type="button"
                    aria-label="${item.done ? 'Mark incomplete' : 'Mark complete'}: ${esc(item.title)}">
              ${item.done ? '✓' : ''}
            </button>
            <div class="todo-body">
              <div class="todo-title">${esc(item.title)}</div>
              <div class="meta">
                <span class="badge badge-${item.priority}">${item.priority}</span>
                ${item.due ? `<span class="due${over ? ' over' : ''}">📅 ${item.due}</span>` : ''}
                ${item.notes ? `<span class="note-preview">${esc(item.notes)}</span>` : ''}
              </div>
            </div>
            <div class="item-actions">
              <button class="btn btn-ghost btn-sm btn-icon" data-edit type="button" aria-label="Edit">✏️</button>
              <button class="btn btn-red   btn-sm btn-icon" data-del  type="button" aria-label="Delete">🗑</button>
            </div>`;
          el.querySelector('.chk').addEventListener('click', () => toggleDone(item.id));
          el.querySelector('[data-edit]').addEventListener('click', () => openEdit(item.id));
          el.querySelector('[data-del]').addEventListener('click',  () => delItem(item.id));
          frag.appendChild(el);
        });
        list.innerHTML = '';
        list.appendChild(frag);
      }

      /* ── Add ── */
      function addItem() {
        const title = $('q-title').value.trim();
        if (!title) { toast('Please enter a task'); return; }

        const item = {
          id:       crypto.randomUUID(),
          title,
          notes:    '',
          priority: $('q-pri').value,
          due:      $('q-due').value,
          done:     false,
          created:  Date.now(),
        };
        items.unshift(item);
        saveToStorage(items);
        $('q-title').value = '';
        $('q-due').value   = '';
        render();
      }

      /* ── Toggle done ── */
      function toggleDone(id) {
        const item = items.find(x => x.id === id);
        if (!item) return;
        item.done = !item.done;
        saveToStorage(items);
        render();
      }

      /* ── Edit dialog ── */
      function openEdit(id) {
        const item = items.find(x => x.id === id);
        if (!item) return;
        $('e-id').value    = id;
        $('e-title').value = item.title;
        $('e-notes').value = item.notes || '';
        $('e-pri').value   = item.priority;
        $('e-due').value   = item.due   || '';
        dlg.showModal();
        setTimeout(() => $('e-title').focus(), 40);
      }

      function closeDialog() { dlg.close(); }

      function saveEdit() {
        const id    = $('e-id').value;
        const title = $('e-title').value.trim();
        if (!title) { toast('Title is required'); return; }

        const idx = items.findIndex(x => x.id === id);
        if (idx < 0) { closeDialog(); return; }

        items[idx] = {
          ...items[idx],
          title,
          notes:    $('e-notes').value.trim(),
          priority: $('e-pri').value,
          due:      $('e-due').value,
        };
        saveToStorage(items);
        closeDialog();
        render();
      }

      /* ── Delete ── */
      async function delItem(id) {
        const item = items.find(x => x.id === id);
        if (!item) return;
        const confirmed = await confirmDelete(item.title);
        if (!confirmed) return;
        items = items.filter(x => x.id !== id);
        saveToStorage(items);
        render();
      }

      /* ── Delete confirmation dialog ── */
      function confirmDelete(name) {
        return new Promise(resolve => {
          $('del-dlg-name').textContent = name;
          $('del-dlg').showModal();

          $('del-confirm').addEventListener('click', () => {
            $('del-dlg').close();
            resolve(true);
          }, { once: true });

          $('del-cancel').addEventListener('click', () => {
            $('del-dlg').close();
            resolve(false);
          }, { once: true });

          $('del-dlg').addEventListener('cancel', () => {
            resolve(false);
          }, { once: true });
        });
      }

      /* ── XSS escape ── */
      const _em = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' };
      function esc(s) { return String(s).replace(/[&<>"']/g, c => _em[c]); }

    }());
</script>
</body>
</html>
