<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vault — encrypted password manager">
    <meta name="theme-color" content="#4f46e5">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & tokens ── */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
          --accent:#4f46e5;--accent-h:#4338ca;--accent2:#7c3aed;
          --text:#0f172a;--muted:#64748b;--success:#059669;--danger:#dc2626;
          --r:8px;--r-lg:14px;
          --sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);
          --sh-md:0 4px 16px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.07);
        }
        body{font-family:'Inter',system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

        /* ── Auth view (centred card) ── */
        #auth-view{
          display:flex;align-items:center;justify-content:center;
          min-height:100vh;padding:20px;
          background:linear-gradient(135deg,#eef2ff 0%,#f1f5f9 55%,#faf5ff 100%);
        }
        .auth-card{
          width:100%;max-width:390px;background:var(--surface);
          border-radius:var(--r-lg);padding:36px 32px;
          box-shadow:var(--sh-md);animation:fadeUp .3s ease;
        }
        .logo{text-align:center;margin-bottom:28px}
        .logo-mark{
          width:48px;height:48px;border-radius:13px;margin:0 auto 10px;
          background:linear-gradient(135deg,var(--accent),var(--accent2));
          display:flex;align-items:center;justify-content:center;
          font-size:22px;box-shadow:0 6px 18px rgba(79,70,229,.28);
        }
        .logo h1{font-size:1.4rem;letter-spacing:-.3px}
        .logo p{font-size:.82rem;color:var(--muted);margin-top:3px}
        .auth-title{font-size:1rem;font-weight:700;margin-bottom:18px}

        /* ── App view (full page) ── */
        #app-view{display:none;flex-direction:column;min-height:100vh}
        #app-view.visible{display:flex}

        /* Topbar */
        .topbar{
          background:var(--surface);border-bottom:1.5px solid var(--border);
          padding:0 20px;height:52px;
          display:flex;align-items:center;gap:12px;
          position:sticky;top:0;z-index:50;
        }
        .topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;text-decoration:none;color:var(--text)}
        .topbar-logo-mark{
          width:28px;height:28px;border-radius:7px;
          background:linear-gradient(135deg,var(--accent),var(--accent2));
          display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
        }
        .topbar-spacer{flex:1}
        .topbar-user{font-size:.82rem;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .btn-out{
          padding:6px 12px;border-radius:var(--r);border:1.5px solid #fecaca;
          background:#fef2f2;color:var(--danger);font:600 .78rem/1 inherit;
          cursor:pointer;transition:background .14s;white-space:nowrap;
        }
        .btn-out:hover{background:#fee2e2}

        /* Content area */
        .content{flex:1;padding:20px;max-width:900px;width:100%;margin:0 auto}

        /* Toolbar */
        .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
        .search-wrap{flex:1;min-width:140px;position:relative}
        .search-wrap input{padding-left:34px;width:100%}
        .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem;pointer-events:none}
        .count-lbl{font-size:.78rem;color:var(--muted);align-self:center;white-space:nowrap}

        /* Password list — single column, stacked */
        .pw-grid{display:flex;flex-direction:column;gap:8px;max-width:720px}

        .pw-card{
          background:var(--surface);border:1.5px solid var(--border);
          border-radius:var(--r-lg);padding:14px 18px;
          display:flex;align-items:center;gap:14px;
          transition:border-color .15s,box-shadow .15s;animation:fadeUp .2s ease;
        }
        .pw-card:hover{border-color:#c7d2fe;box-shadow:0 2px 12px rgba(79,70,229,.08)}
        .pw-av{
          width:42px;height:42px;border-radius:10px;flex-shrink:0;
          background:linear-gradient(135deg,#eef2ff,#e0e7ff);
          display:flex;align-items:center;justify-content:center;
          font-weight:700;font-size:1rem;color:var(--accent);text-transform:uppercase;
        }
        .pw-info{flex:1;min-width:0}
        .pw-site{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .pw-user{font-size:.78rem;color:var(--muted);margin-top:2px}
        .pw-url{font-size:.72rem;color:var(--accent);opacity:.7;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .pw-actions{display:flex;gap:6px;flex-shrink:0}

        /* ── Shared form elements ── */
        input,select,textarea{
          width:100%;padding:9px 13px;
          border:1.5px solid var(--border);border-radius:var(--r);
          font:inherit;font-size:.875rem;color:var(--text);background:var(--surface);
          transition:border-color .15s,box-shadow .15s;outline:none;
        }
        input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.13)}
        input::placeholder,textarea::placeholder{color:var(--muted);opacity:.65}
        textarea{resize:vertical;min-height:70px}
        select{cursor:pointer}

        .field{margin-bottom:14px}
        .field label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}

        /* ── Buttons ── */
        .btn{
          display:inline-flex;align-items:center;gap:6px;
          padding:9px 16px;border:1.5px solid transparent;border-radius:var(--r);
          font:600 .855rem/1 inherit;cursor:pointer;
          transition:background .15s,transform .15s,box-shadow .15s;
          white-space:nowrap;text-decoration:none;user-select:none;
        }
        .btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:not(:disabled):hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 3px 10px rgba(79,70,229,.3)}
        .btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
        .btn-ghost:not(:disabled):hover{background:var(--bg);color:var(--text)}
        .btn-danger{background:#fef2f2;color:var(--danger);border-color:#fecaca}
        .btn-danger:not(:disabled):hover{background:#fee2e2}
        .btn-success{background:#f0fdf4;color:var(--success);border-color:#bbf7d0}
        .btn-success:not(:disabled):hover{background:#dcfce7}
        .btn-sm{padding:6px 12px;font-size:.8rem}
        .btn-icon{padding:7px 9px}
        .btn-full{width:100%;justify-content:center;padding:11px}

        /* ── Password field with show/hide ── */
        .pw-wrap{position:relative}
        .pw-wrap input{padding-right:58px}
        .vis-btn{
          position:absolute;right:8px;top:50%;transform:translateY(-50%);
          background:none;border:none;font:600 .72rem/1 inherit;
          color:var(--muted);cursor:pointer;padding:3px 5px;
        }

        /* ── Dialog error banner (shown inside dialog, above backdrop) ── */
        .dlg-error{
          display:none;align-items:center;gap:8px;
          background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d;
          border-radius:var(--r);padding:10px 13px;
          font-size:.83rem;font-weight:500;margin-bottom:14px;
        }
        .dlg-error.show{display:flex}

        /* ── Dialog — centred in viewport on all browsers ── */
        dialog{
          background:var(--surface);border:none;border-radius:var(--r-lg);
          padding:26px;width:min(460px,calc(100vw - 32px));
          max-height:92vh;overflow-y:auto;box-shadow:var(--sh-md);
          position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;
        }
        dialog::backdrop{background:rgba(15,23,42,.45);backdrop-filter:blur(3px)}
        dialog[open]{animation:dlgIn .2s cubic-bezier(.16,1,.3,1)}
        @keyframes dlgIn{from{opacity:0;transform:translate(-50%,-47%)}to{opacity:1;transform:translate(-50%,-50%)}}
        .dlg-title{font-size:1rem;font-weight:700;margin-bottom:18px}
        .dlg-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

        /* ── Strength meter ── */
        .str-bar{height:3px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
        .str-fill{height:100%;border-radius:2px;width:0;transition:width .25s,background .25s}
        .str-lbl{font-size:.7rem;color:var(--muted);margin-top:4px;min-height:1em}
        .reqs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
        .req{font-size:.68rem;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--muted);transition:all .18s}
        .req.ok{background:#f0fdf4;color:var(--success)}

        /* ── Auth toggle link ── */
        .auth-toggle{text-align:center;margin-top:16px;font-size:.845rem;color:var(--muted)}
        .auth-toggle a{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none}
        .auth-toggle a:hover{text-decoration:underline}

        /* ── Divider ── */
        .divider{text-align:center;margin:16px 0;font-size:.8rem;color:var(--muted);position:relative}
        .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
        .divider::before{left:0}.divider::after{right:0}

        /* ── Empty state ── */
        .empty{text-align:center;padding:52px 20px;color:var(--muted);grid-column:1/-1}
        .empty-icon{font-size:2rem;margin-bottom:12px;opacity:.4;display:block}
        .empty h3{font-size:1rem;color:var(--text);margin-bottom:6px;font-weight:600}
        .empty p{font-size:.845rem}

        /* ── Toast ── */
        #toast{
          position:fixed;bottom:20px;right:20px;
          padding:11px 16px;border-radius:10px;
          font-size:.845rem;font-weight:500;
          display:none;align-items:center;gap:8px;
          z-index:9999;max-width:290px;box-shadow:var(--sh-md);
        }
        #toast.show{display:flex;animation:fadeUp .22s ease}
        #toast.success{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
        #toast.error{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}
        #toast.info{background:#eff6ff;border:1px solid #93c5fd;color:#1e3a5f}

        /* ── Spinner ── */
        .spinner{width:14px;height:14px;flex-shrink:0;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
        .copy-ok{background:#f0fdf4!important;color:var(--success)!important;border-color:#86efac!important}

        /* ── Animations ── */
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ── Mobile tweaks ── */
        @media(max-width:480px){
          .auth-card{padding:28px 22px}
          .topbar{padding:0 14px}
          .content{padding:14px}
          .pw-card{flex-wrap:wrap}
          .pw-actions{width:100%;justify-content:flex-end;margin-top:4px}
          dialog{padding:20px}
        }
    </style>
</head>
<body>

<!-- ═══════════════════ AUTH VIEW ═══════════════════ -->
<div id="auth-view" {% if logged_in %}style="display:none"{% endif %}>
    <div class="auth-card">
        <div class="logo">
            <div class="logo-mark" aria-hidden="true">🔐</div>
            <h1>Vault</h1>
            <p>Your encrypted password manager</p>
        </div>

        <!-- Login form -->
        <div id="login-form">
            <div class="auth-title">Sign in</div>
            <div class="field"><label for="l-email">Email</label>
                <input type="email" id="l-email" autocomplete="email" placeholder="you@example.com" required></div>
            <div class="field"><label for="l-pw">Password</label>
                <input type="password" id="l-pw" autocomplete="current-password" placeholder="••••••••" required></div>
            <button class="btn btn-primary btn-full" id="login-btn" type="button">Sign In</button>
            <div class="auth-toggle">No account? <a id="go-register">Create one →</a></div>
        </div>

        <!-- Register form (hidden by default) -->
        <div id="register-form" style="display:none">
            <div class="auth-title">Create account</div>
            <div class="field"><label for="r-name">Full Name</label>
                <input type="text" id="r-name" autocomplete="name" placeholder="Jane Smith" maxlength="120" required></div>
            <div class="field"><label for="r-email">Email</label>
                <input type="email" id="r-email" autocomplete="email" placeholder="you@example.com" required></div>
            <div class="field"><label for="r-pw">Password</label>
                <input type="password" id="r-pw" autocomplete="new-password" placeholder="Choose a strong password" maxlength="256" required>
                <div class="str-bar"><div class="str-fill" id="str-fill"></div></div>
                <div class="str-lbl" id="str-lbl"></div>
                <div class="reqs">
                    <span class="req" id="req-len">8+ chars</span>
                    <span class="req" id="req-up">Uppercase</span>
                    <span class="req" id="req-lo">Lowercase</span>
                    <span class="req" id="req-num">Number</span>
                    <span class="req" id="req-sym">Symbol</span>
                </div>
            </div>
            <div class="field"><label for="r-confirm">Confirm Password</label>
                <input type="password" id="r-confirm" autocomplete="new-password" placeholder="Repeat password" maxlength="256" required></div>
            <button class="btn btn-primary btn-full" id="register-btn" type="button">Create Account</button>
            <div class="auth-toggle">Already have an account? <a id="go-login">Sign in →</a></div>
        </div>
    </div>
</div>

<!-- ═══════════════════ APP VIEW ═══════════════════ -->
<div id="app-view" class="{% if logged_in %}visible{% endif %}">

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-logo" aria-label="Vault home">
            <div class="topbar-logo-mark" aria-hidden="true">🔐</div>
            Vault
        </div>
                <div class="topbar-spacer"></div>
        <span class="topbar-user" id="topbar-user" title="{{ username }}">{{ username }}</span>
        <button class="btn-out" id="signout-btn" type="button">Sign out</button>
    </header>

    <!-- Passwords content -->
    <main class="content">
        <div class="toolbar">
            <div class="search-wrap">
                <span class="s-icon" aria-hidden="true">🔍</span>
                <input type="search" id="search" placeholder="Search passwords…"
                       aria-label="Search passwords" autocomplete="off">
            </div>
            <span class="count-lbl" id="count-lbl" aria-live="polite"></span>
            <button class="btn btn-primary" id="add-btn" type="button">+ Add</button>
        </div>

        <div class="pw-grid" id="pw-grid" aria-live="polite" aria-label="Saved passwords">
            <div class="empty">
                <span class="empty-icon" aria-hidden="true">⏳</span>
                <h3>Loading…</h3>
            </div>
        </div>
    </main>
</div>

<!-- ═══════════════════ PASSWORD DIALOG ═══════════════════ -->
<dialog id="pw-dialog" aria-labelledby="dlg-title">
    <div class="dlg-title" id="dlg-title">Add Password</div>
    <div class="dlg-error" id="dlg-error" role="alert" aria-live="assertive"></div>
    <input type="hidden" id="f-id">
    <div class="field"><label for="f-site">Site / App *</label>
        <input type="text" id="f-site" autocomplete="off" placeholder="e.g. GitHub" maxlength="200"></div>
    <div class="field"><label for="f-url">URL</label>
        <input type="url" id="f-url" autocomplete="off" placeholder="https://github.com" maxlength="500"></div>
    <div class="field"><label for="f-user">Username / Email *</label>
        <input type="text" id="f-user" autocomplete="off" placeholder="your@email.com" maxlength="200"></div>
    <div class="field"><label for="f-pw">Password *</label>
        <div class="pw-wrap">
            <input type="password" id="f-pw" autocomplete="new-password" placeholder="••••••••" maxlength="500">
            <button class="vis-btn" id="vis-btn" type="button">Show</button>
        </div>
    </div>
    <div style="margin-bottom:14px">
        <button class="btn btn-ghost btn-sm" id="gen-btn" type="button">🎲 Generate</button>
    </div>
    <div class="field"><label for="f-notes">Notes</label>
        <textarea id="f-notes" placeholder="Optional…" maxlength="1000"></textarea></div>
    <div class="dlg-footer">
        <button class="btn btn-ghost" id="dlg-cancel" type="button">Cancel</button>
        <button class="btn btn-primary" id="dlg-save" type="button">Save</button>
    </div>
</dialog>

<div id="toast" role="alert" aria-live="polite"></div>

<script>
    (function () {
      'use strict';

      /* ── Server-rendered state ── */
      const LOGGED_IN   = {{ 'true' if logged_in else 'false' }};
      const SHOW_REG    = {{ 'true' if show_register is defined and show_register else 'false' }};
      let   USERNAME    = {{ username|tojson }};
      let   passwords   = [];

      /* ── DOM shortcuts ── */
      const $ = id => document.getElementById(id);

      /* ── Bootstrap ── */
      document.addEventListener('DOMContentLoaded', () => {
        bindAuth();
        bindApp();
        if (SHOW_REG) showRegister();
        if (LOGGED_IN) {
          $('topbar-user').textContent = USERNAME;
          loadPasswords();
        }
      });

      /* ══════════════ AUTH ══════════════ */

      function showLogin() {
        $('login-form').style.display    = '';
        $('register-form').style.display = 'none';
      }
      function showRegister() {
        $('login-form').style.display    = 'none';
        $('register-form').style.display = '';
      }

      function bindAuth() {
        $('go-register').addEventListener('click', showRegister);
        $('go-login').addEventListener('click', showLogin);
        $('login-btn').addEventListener('click', doLogin);
        $('register-btn').addEventListener('click', doRegister);
        $('l-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        $('r-confirm').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
        $('r-pw').addEventListener('input', e => checkStrength(e.target.value));
      }

      async function doLogin() {
        const email = $('l-email').value.trim();
        const pw    = $('l-pw').value;
        if (!email || !pw) { toast('Please fill in all fields'); return; }

        const btn = $('login-btn');
        setLoading(btn, 'Signing in…');
        try {
          const res  = await api('/vault/api/login', { method:'POST', body:{ email, password:pw } });
          USERNAME   = res.username;
          $('topbar-user').textContent = res.username;
          /* Switch views */
          $('auth-view').style.display = 'none';
          $('app-view').classList.add('visible');
          await loadPasswords();
        } catch (err) {
          toast(err.message || 'Sign in failed');
        } finally { resetBtn(btn, 'Sign In'); }
      }

      async function doRegister() {
        const name    = $('r-name').value.trim();
        const email   = $('r-email').value.trim();
        const pw      = $('r-pw').value;
        const confirm = $('r-confirm').value;
        if (!name || !email || !pw || !confirm) { toast('All fields are required'); return; }
        if (pw.length < 8)    { toast('Password must be at least 8 characters'); return; }
        if (pw !== confirm)   { toast('Passwords do not match'); return; }

        const btn = $('register-btn');
        setLoading(btn, 'Creating…');
        try {
          await api('/vault/api/register', { method:'POST', body:{ username:name, email, password:pw } });
          toast('Account created! Please sign in.', 'success');
          /* Prefill email and flip to login */
          $('l-email').value = email;
          showLogin();
        } catch (err) {
          toast(err.message || 'Registration failed');
        } finally { resetBtn(btn, 'Create Account'); }
      }

      /* Strength meter */
      const SC = ['','#ef4444','#f59e0b','#eab308','#10b981','#4f46e5'];
      const SL = ['','Weak','Fair','Good','Strong','Excellent'];
      function checkStrength(v) {
        const rules = [
          {id:'req-len',ok:v.length>=8},{id:'req-up',ok:/[A-Z]/.test(v)},
          {id:'req-lo',ok:/[a-z]/.test(v)},{id:'req-num',ok:/\d/.test(v)},
          {id:'req-sym',ok:/[^A-Za-z0-9]/.test(v)},
        ];
        const s = rules.filter(r=>r.ok).length;
        rules.forEach(r => $(`${r.id}`).classList.toggle('ok', r.ok));
        const fill = $('str-fill');
        fill.style.cssText = `width:${s*20}%;background:${SC[s]||'transparent'}`;
        const lbl = $('str-lbl');
        lbl.textContent = s ? SL[s] : '';
        lbl.style.color = SC[s]||'';
      }

      /* ══════════════ APP ══════════════ */

      function bindApp() {
        $('signout-btn').addEventListener('click', doLogout);
        $('add-btn').addEventListener('click', openAdd);
        $('dlg-save').addEventListener('click', save);
        $('dlg-cancel').addEventListener('click', closeDialog);
        $('gen-btn').addEventListener('click', genPw);
        $('vis-btn').addEventListener('click', toggleVis);
        $('pw-dialog').addEventListener('click', e => { if (e.target === $('pw-dialog')) closeDialog(); });
        $('pw-dialog').addEventListener('cancel', closeDialog);

        /* Debounced search */
        let t;
        $('search').addEventListener('input', () => { clearTimeout(t); t = setTimeout(render, 160); });
      }

      async function doLogout() {
        try { await fetch('/vault/api/logout', { method:'POST' }); } catch { /* ignore */ }
        $('app-view').classList.remove('visible');
        $('auth-view').style.display = '';
        passwords = [];
        $('l-email').value = '';
        $('l-pw').value    = '';
        showLogin();
      }

      /* ── Passwords ── */
      async function loadPasswords() {
        try {
          passwords = await api('/vault/api/passwords');
          render();
        } catch (err) {
          if (err.message.includes('401')) { doLogout(); return; }
          toast('Failed to load passwords');
        }
      }

      function render() {
        const q    = $('search').value.toLowerCase();
        const list = q
          ? passwords.filter(p =>
              p.site_name.toLowerCase().includes(q) ||
              p.username.toLowerCase().includes(q)  ||
              (p.site_url||'').toLowerCase().includes(q))
          : passwords;

        $('count-lbl').textContent = passwords.length ? `${passwords.length} saved` : '';

        const grid = $('pw-grid');
        if (!list.length) {
          grid.innerHTML = `<div class="empty">
            <span class="empty-icon" aria-hidden="true">🔑</span>
            <h3>${q ? 'No results found' : 'No passwords saved yet'}</h3>
            <p>${q ? 'Try a different search term' : 'Click "+ Add" to store your first entry'}</p>
          </div>`;
          return;
        }

        const frag = document.createDocumentFragment();
        list.forEach(p => {
          const card = document.createElement('div');
          card.className = 'pw-card';
          card.innerHTML = `
            <div class="pw-av" aria-hidden="true">${esc(p.site_name[0])}</div>
            <div class="pw-info">
              <div class="pw-site">${esc(p.site_name)}</div>
              <div class="pw-user">${esc(p.username)}</div>
              ${p.site_url ? `<div class="pw-url">${esc(p.site_url)}</div>` : ''}
            </div>
            <div class="pw-actions">
              <button class="btn btn-success btn-sm" data-copy="${p.id}"
                      aria-label="Copy password for ${esc(p.site_name)}">📋 Copy</button>
              <button class="btn btn-ghost btn-sm btn-icon" data-edit="${p.id}"
                      aria-label="Edit ${esc(p.site_name)}">✏️</button>
              <button class="btn btn-danger btn-sm btn-icon" data-del="${p.id}"
                      aria-label="Delete ${esc(p.site_name)}">🗑</button>
            </div>`;
          card.querySelector('[data-copy]').addEventListener('click', e => copyPw(p.id, e.currentTarget));
          card.querySelector('[data-edit]').addEventListener('click', () => openEdit(p.id));
          card.querySelector('[data-del]').addEventListener('click',  () => delEntry(p.id));
          frag.appendChild(card);
        });
        grid.innerHTML = '';
        grid.appendChild(frag);
      }

      async function copyPw(id, btn) {
        try {
          const data = await api(`/vault/api/passwords/${id}/copy`, { method:'POST' });
          await navigator.clipboard.writeText(data.password);
          btn.classList.add('copy-ok');
          btn.textContent = '✓ Copied';
          setTimeout(() => { btn.classList.remove('copy-ok'); btn.textContent = '📋 Copy'; }, 2000);
        } catch { toast('Clipboard access denied'); }
      }

      /* ── Dialog ── */
      function resetForm() {
        ['f-id','f-site','f-url','f-user','f-pw','f-notes'].forEach(id => { $(id).value = ''; });
        $('f-pw').type = 'password';
        $('vis-btn').textContent = 'Show';
        dlgErrorClear();
      }
      function openAdd() {
        resetForm();
        $('dlg-title').textContent = 'Add Password';
        $('pw-dialog').showModal();
        setTimeout(() => $('f-site').focus(), 40);
      }
      function openEdit(id) {
        const p = passwords.find(x => x.id === id);
        if (!p) return;
        resetForm();
        $('f-id').value    = id;
        $('f-site').value  = p.site_name;
        $('f-url').value   = p.site_url  || '';
        $('f-user').value  = p.username;
        $('f-notes').value = p.notes     || '';
        $('dlg-title').textContent = 'Edit Password';
        $('pw-dialog').showModal();
      }
      function closeDialog() { $('pw-dialog').close(); resetForm(); }

      async function save() {
        const id   = $('f-id').value;
        const body = {
          site_name: $('f-site').value.trim(),
          site_url:  $('f-url').value.trim(),
          username:  $('f-user').value.trim(),
          password:  $('f-pw').value,
          notes:     $('f-notes').value.trim(),
        };
        dlgErrorClear();
        if (!body.site_name || !body.username) { dlgError('Site name and username are required'); return; }
        if (!id && !body.password)             { dlgError('Password is required'); return; }

        const btn = $('dlg-save');
        setLoading(btn, 'Saving…');
        try {
          const url    = id ? `/vault/api/passwords/${id}` : '/vault/api/passwords';
          const method = id ? 'PUT' : 'POST';
          await api(url, { method, body });
          toast(id ? 'Updated ✓' : 'Saved ✓', 'success');
          closeDialog();
          await loadPasswords();
        } catch (err) { dlgError(err.message || 'Save failed'); }
        finally { resetBtn(btn, 'Save'); }
      }

      async function delEntry(id) {
        if (!confirm('Delete this entry? Cannot be undone.')) return;
        try {
          await api(`/vault/api/passwords/${id}`, { method:'DELETE' });
          toast('Deleted', 'success');
          await loadPasswords();
        } catch (err) { toast(err.message || 'Delete failed'); }
      }

      /* ── Password helpers ── */
      function toggleVis() {
        const inp = $('f-pw'), btn = $('vis-btn');
        const hide = inp.type === 'password';
        inp.type        = hide ? 'text'  : 'password';
        btn.textContent = hide ? 'Hide'  : 'Show';
      }
      function genPw() {
        const c = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
        const a = new Uint8Array(20);
        crypto.getRandomValues(a);
        $('f-pw').value        = [...a].map(b => c[b % c.length]).join('');
        $('f-pw').type         = 'text';
        $('vis-btn').textContent = 'Hide';
        toast('Strong password generated', 'info');
      }

      /* ── Shared utilities ── */
      async function api(url, { method = 'GET', body } = {}) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = typeof body === 'string' ? body : JSON.stringify(body);
        const res  = await fetch(url, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      let _tt;
      function toast(msg, type = 'error') {
        const el = $('toast');
        el.textContent = msg;
        el.className   = type + ' show';
        clearTimeout(_tt);
        _tt = setTimeout(() => { el.className = ''; }, 3500);
      }

      /* Show error inside dialog (never hidden behind backdrop) */
      function dlgError(msg) {
        const el = $('dlg-error');
        el.textContent = msg;
        el.classList.add('show');
      }
      function dlgErrorClear() {
        const el = $('dlg-error');
        if (el) { el.textContent = ''; el.classList.remove('show'); }
      }

      function setLoading(btn, label) {
        btn.disabled = true;
        btn.dataset.orig = btn.textContent;
        btn.innerHTML = `<span class="spinner"></span> ${label}`;
      }
      function resetBtn(btn, label) {
        btn.disabled    = false;
        btn.textContent = btn.dataset.orig || label;
      }

      const _em = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' };
      function esc(s) { return String(s).replace(/[&<>"']/g, c => _em[c]); }

    }());
</script>
</body>
</html>
